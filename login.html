<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dezoito K</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: #070605;
            background-image:
                radial-gradient(ellipse 80% 60% at 30% 40%, rgba(201, 162, 39, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse 60% 80% at 75% 75%, rgba(201, 162, 39, 0.025) 0%, transparent 55%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Bricolage Grotesque', 'Helvetica Neue', sans-serif;
        }

        .login-card {
            background: #0d0c0a;
            border: 1px solid #1e1c17;
            box-shadow: 0 0 0 1px rgba(201, 162, 39, 0.1), 0 32px 64px rgba(0, 0, 0, 0.6);
            padding: 44px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: loginReveal 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes loginReveal {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* gold shimmer top edge */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 162, 39, 0.5), transparent);
            border-radius: 16px 16px 0 0;
        }

        .login-logo {
            height: 58px;
            margin-bottom: 36px;
            display: inline-block;
            filter: brightness(1.05);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 7px;
            color: #8a847a;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #0a0907;
            border: 1px solid #1e1c17;
            border-radius: 8px;
            color: #f0ebe0;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: rgba(201, 162, 39, 0.35);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.07);
        }

        .form-input::placeholder {
            color: #514d48;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #c9a227;
            color: #0a0907;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Bricolage Grotesque', sans-serif;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #e8c97e;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201, 162, 39, 0.25);
        }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #f48771;
            font-size: 12.5px;
            margin-top: 14px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-msg.visible {
            opacity: 1;
        }

        .bg-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.04) 0%, transparent 65%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>

    <div class="login-card">
        <img src="logo.png"
            alt="Dezoito K" class="login-logo">

        <form id="login-form">
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <div style="position: relative;">
                    <i class="ph ph-envelope" style="position: absolute; left: 14px; top: 14px; color: #555;"></i>
                    <input type="email" id="email" class="form-input" style="padding-left: 40px;"
                        placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Senha</label>
                <div style="position: relative;">
                    <i class="ph ph-lock" style="position: absolute; left: 14px; top: 14px; color: #555;"></i>
                    <input type="password" id="password" class="form-input" style="padding-left: 40px;"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="login-btn">Entrar</button>
            <div id="error-message" class="error-msg"></div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-message');

        const { createClient } = supabase;
        const supabaseClient = createClient(window.SUPABASE_CONFIG.URL, window.SUPABASE_CONFIG.KEY);

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorMsg.classList.remove('visible');
            errorMsg.textContent = '';
            loginBtn.textContent = 'Entrando...';
            loginBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                // Sucesso!
                loginBtn.textContent = 'Sucesso!';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);

            } catch (err) {
                console.error("Login error:", err);
                errorMsg.textContent = 'E-mail ou senha inválidos.';
                errorMsg.classList.add('visible');
                loginBtn.textContent = 'Entrar';
                loginBtn.disabled = false;
            }
        });

        // Verificar se já está logado
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();

    </script>
</body>

</html>
